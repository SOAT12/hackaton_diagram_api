apiVersion: apps/v1
kind: Deployment
metadata:
  name: diagram-api-deployment
  namespace: default
  labels:
    app: diagram-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: diagram-api
  template:
    metadata:
      labels:
        app: diagram-api
    spec:
      serviceAccountName: diagram-sa
      containers:
        - name: diagram-api
          image: <ECR_REGISTRY>/hackaton-diagram-api:latest
          ports:
            - containerPort: 8080
          env:
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: diagram-secrets
                  key: DB_URL
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: diagram-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: diagram-secrets
                  key: DB_PASSWORD
            - name: AWS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: diagram-secrets
                  key: AWS_ACCESS_KEY
            - name: AWS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: diagram-secrets
                  key: AWS_SECRET_KEY
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"